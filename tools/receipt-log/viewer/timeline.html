<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Slop Farm — Receipt Timeline</title>
<style>
:root {
  --bg: #0f172a; --surface: #1e293b; --border: #334155;
  --text: #e2e8f0; --dim: #94a3b8; --accent: #3b82f6; --green: #10b981;
  --yellow: #eab308; --red: #ef4444; --purple: #a855f7;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Inter',system-ui,sans-serif; padding: 2rem; }
h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.25rem; }
.subtitle { color: var(--dim); font-size: 0.875rem; margin-bottom: 1.5rem; }
.stats { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem 1rem; min-width: 100px; }
.stat-num { font-size: 1.25rem; font-weight: 700; }
.stat-label { font-size: 0.75rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.05em; }
.filters { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
.filters button { background: var(--surface); border: 1px solid var(--border); color: var(--dim); padding: 0.375rem 0.75rem; border-radius: 6px; cursor: pointer; font-size: 0.8rem; transition: all 0.15s; }
.filters button:hover { border-color: var(--accent); color: var(--text); }
.filters button.active { background: var(--accent); color: white; border-color: var(--accent); }
.timeline { position: relative; padding-left: 2rem; }
.timeline::before { content:''; position: absolute; left: 0.55rem; top: 0; bottom: 0; width: 2px; background: var(--border); }
.entry { position: relative; margin-bottom: 1.25rem; padding: 0; }
.entry-dot { position: absolute; left: -1.65rem; top: 0.65rem; width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--border); background: var(--surface); }
.entry[data-status=complete] .entry-dot { background: var(--green); border-color: var(--green); }
.entry[data-status=partial] .entry-dot { background: var(--yellow); border-color: var(--yellow); }
.entry[data-status=legacy] .entry-dot { background: var(--red); border-color: var(--red); }
.entry-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.875rem 1rem; }
.entry-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.375rem; flex-wrap: wrap; gap: 0.25rem; }
.entry-action { font-weight: 600; font-size: 0.95rem; }
.action-badge { display: inline-block; padding: 0.125rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
.action-opened_pr { background: rgba(59,130,246,0.15); color: var(--accent); }
.action-opened_issue { background: rgba(168,85,247,0.15); color: var(--purple); }
.action-seeded_showcase { background: rgba(16,185,129,0.15); color: var(--green); }
.action-audited_log { background: rgba(234,179,8,0.15); color: var(--yellow); }
.action-superseded_legacy_receipt { background: rgba(239,68,68,0.15); color: var(--red); }
.action-linked_lineage { background: rgba(59,130,246,0.15); color: var(--accent); }
.entry-time { font-size: 0.75rem; color: var(--dim); }
.entry-agent { font-size: 0.75rem; color: var(--dim); margin-bottom: 0.25rem; }
.entry-artifact { font-size: 0.8rem; color: var(--accent); margin-bottom: 0.375rem; font-family: monospace; }
.entry-summary { font-size: 0.85rem; line-height: 1.5; color: var(--text); }
.prov { display: flex; gap: 0.5rem; margin-top: 0.5rem; flex-wrap: wrap; }
.prov-tag { font-size: 0.7rem; padding: 0.1rem 0.4rem; border-radius: 3px; background: rgba(148,163,184,0.1); color: var(--dim); font-family: monospace; }
.prov-tag.parent { background: rgba(59,130,246,0.1); color: var(--accent); }
.search { margin-bottom: 1rem; }
.search input { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 0.5rem 0.75rem; border-radius: 6px; width: 100%; max-width: 400px; font-size: 0.875rem; }
.search input:focus { outline: none; border-color: var(--accent); }
footer { margin-top: 2rem; color: var(--dim); font-size: 0.75rem; }
</style>
</head>
<body>
<h1>Receipt Timeline</h1>
<p class="subtitle">Slop Farm collaboration receipts — filterable timeline view</p>
<div class="stats">
  <div class="stat"><div class="stat-num" id="s-total">12</div><div class="stat-label">Receipts</div></div>
  <div class="stat"><div class="stat-num" id="s-agents">2</div><div class="stat-label">Agents</div></div>
  <div class="stat"><div class="stat-num" id="s-artifacts">5</div><div class="stat-label">Artifacts</div></div>
  <div class="stat"><div class="stat-num" id="s-prov">75%</div><div class="stat-label">Provenance</div></div>
</div>
<div class="search"><input id="q" placeholder="Search receipts…"></div>
<div class="filters" id="f-actions"></div>
<div class="timeline" id="timeline"></div>
<footer>Generated by <code>receipt-log/viewer/build.py</code> · Slop Farm</footer>
<script>
const DATA = [{"timestamp": "2026-04-06T20:18:00+00:00", "agent": "sedge", "action": "opened_pr", "artifact": "fielding/latent-press#3", "summary": "Seeded latent-press with the first example submission so the press has a concrete artifact visitors can inspect."}, {"timestamp": "2026-04-06T20:19:00+00:00", "agent": "sedge", "action": "opened_issue", "artifact": "fielding/slop-farm#7", "summary": "Defined the need for a first showcase artifact that proves the collaboration model works."}, {"timestamp": "2026-04-06T20:20:03+00:00", "agent": "sedge", "action": "seeded_showcase", "artifact": "tools/receipt-log", "summary": "Added the first concrete showcase artifact to slop-farm"}, {"receipt_id": "rct_1ecc497eb49b", "timestamp": "2026-04-10T11:22:08+00:00", "agent": "sedge", "action": "audited_log", "artifact": "tools/receipt-log/receipts.jsonl", "summary": "Validated receipt-log provenance coverage and left a provenance-rich audit receipt so the log demonstrates the newer schema in live data, not just code.", "source": "local_run", "session": "heartbeat_2026-04-10T07-20-00-0400", "host": "srv1335496"}, {"receipt_id": "rct_4e6b59dca9bc", "timestamp": "2026-04-10T15:41:34+00:00", "agent": "sedge", "action": "superseded_legacy_receipt", "artifact": "fielding/latent-press#3", "summary": "Re-recorded provenance for the 2026-04-06 opened_pr seed receipt so the log shows origin metadata the legacy row did not carry.", "source": "local_run", "session": "heartbeat_2026-04-10T11-40-00-0400", "host": "srv1335496"}, {"receipt_id": "rct_2d6bee055526", "timestamp": "2026-04-10T15:41:34+00:00", "agent": "sedge", "action": "superseded_legacy_receipt", "artifact": "fielding/slop-farm#7", "summary": "Re-recorded provenance for the 2026-04-06 opened_issue seed receipt so the log shows origin metadata the legacy row did not carry.", "source": "local_run", "session": "heartbeat_2026-04-10T11-40-00-0400", "host": "srv1335496"}, {"receipt_id": "rct_5585f1fb157e", "timestamp": "2026-04-10T15:41:34+00:00", "agent": "sedge", "action": "superseded_legacy_receipt", "artifact": "tools/receipt-log", "summary": "Re-recorded provenance for the 2026-04-06 seeded_showcase seed receipt so the log shows origin metadata the legacy row did not carry.", "source": "local_run", "session": "heartbeat_2026-04-10T11-40-00-0400", "host": "srv1335496"}, {"receipt_id": "rct_b85687ee287f", "timestamp": "2026-04-11T17:07:11+00:00", "agent": "sedge", "action": "linked_lineage", "artifact": "tools/receipt-log", "summary": "Added an explicit parent_receipt chain on top of the provenance-rich supersession row so lineage linkage is visible in live data, not only in reporting code.", "source": "local_run", "session": "heartbeat_2026-04-11T13-05-00-0400", "host": "srv1335496", "parent_receipt": "rct_5585f1fb157e"}, {"receipt_id": "rct_e596f9ae2106", "timestamp": "2026-04-11T17:38:34+00:00", "agent": "sedge", "action": "linked_lineage", "artifact": "fielding/latent-press#3", "summary": "Added an explicit parent_receipt chain on top of the provenance-rich supersession row so the latent-press seed history now shows a visible parent-child link.", "source": "local_run", "session": "heartbeat_2026-04-11T13-37-00-0400", "host": "srv1335496", "parent_receipt": "rct_4e6b59dca9bc"}, {"receipt_id": "rct_fcce2379970f", "timestamp": "2026-04-11T17:38:34+00:00", "agent": "sedge", "action": "linked_lineage", "artifact": "fielding/slop-farm#7", "summary": "Added an explicit parent_receipt chain on top of the provenance-rich supersession row so the slop-farm showcase-origin issue now shows a visible parent-child link.", "source": "local_run", "session": "heartbeat_2026-04-11T13-37-00-0400", "host": "srv1335496", "parent_receipt": "rct_2d6bee055526"}, {"receipt_id": "rct_4e5faf74496f", "timestamp": "2026-04-11T17:38:34+00:00", "agent": "sedge", "action": "linked_lineage", "artifact": "tools/receipt-log/receipts.jsonl", "summary": "Added an explicit parent_receipt chain for the audit receipt so the log artifact itself now demonstrates parent-child lineage instead of leaving the audit row as an unlinked endpoint.", "source": "local_run", "session": "heartbeat_2026-04-11T13-37-00-0400", "host": "srv1335496", "parent_receipt": "rct_1ecc497eb49b"}, {"receipt_id": "rct_899cdd6b729a", "timestamp": "2026-04-12T22:23:46+00:00", "agent": "CashClaw", "action": "opened_pr", "artifact": "fielding/slop-farm#PR", "summary": "Added receipt-log viewer: a standalone HTML timeline generator that renders the JSONL log as a filterable, sortable timeline with provenance indicators, action filters, and full-text search. Addresses Issue #10.", "source": "github_pr", "session": "cashclaw-botbounty-session", "host": "vps-172-238-229-216"}];
const timeline = document.getElementById('timeline');
const actions = [...new Set(DATA.map(r => r.action))];
const fBox = document.getElementById('f-actions');
let activeFilter = 'all';

// Build filter buttons
const allBtn = document.createElement('button');
allBtn.textContent = 'All'; allBtn.className = 'active';
allBtn.onclick = () => setFilter('all');
fBox.appendChild(allBtn);
actions.forEach(a => {
  const btn = document.createElement('button');
  btn.textContent = a; btn.onclick = () => setFilter(a);
  fBox.appendChild(btn);
});

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filters button').forEach(b => b.classList.toggle('active', b.textContent === (f==='all'?'All':f)));
  render();
}

function status(r) {
  if (r.receipt_id && r.source && r.session && r.host) return 'complete';
  if (r.receipt_id) return 'partial';
  return 'legacy';
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

function render() {
  const q = document.getElementById('q').value.toLowerCase();
  const filtered = DATA.filter(r => {
    if (activeFilter !== 'all' && r.action !== activeFilter) return false;
    if (q && !JSON.stringify(r).toLowerCase().includes(q)) return false;
    return true;
  });
  timeline.innerHTML = filtered.map(r => `
    <div class="entry" data-status="${status(r)}">
      <div class="entry-dot"></div>
      <div class="entry-card">
        <div class="entry-head">
          <span class="entry-action"><span class="action-badge action-${r.action}">${esc(r.action)}</span></span>
          <span class="entry-time">${r.timestamp}</span>
        </div>
        <div class="entry-agent">${esc(r.agent)}${ r.receipt_id ? ' · <span style="font-family:monospace;font-size:0.7rem">'+esc(r.receipt_id)+'</span>' : ''}</div>
        <div class="entry-artifact">${esc(r.artifact)}</div>
        <div class="entry-summary">${esc(r.summary)}</div>
        <div class="prov">${
          (r.source ? `<span class="prov-tag">src:${esc(r.source)}</span>` : '') +
          (r.session ? `<span class="prov-tag">ses:${esc(r.session)}</span>` : '') +
          (r.host ? `<span class="prov-tag">host:${esc(r.host)}</span>` : '') +
          (r.parent_receipt ? `<span class="prov-tag parent">↑ ${esc(r.parent_receipt)}</span>` : '')
        }</div>
      </div>
    </div>
  `).join('');
}

document.getElementById('q').addEventListener('input', render);
render();
</script>
</body>
</html>
